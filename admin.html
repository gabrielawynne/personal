<!doctype html>
<html class="no-js" lang="">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin — Gabriel Wynne</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script>
    (function () {
      const saved = localStorage.getItem('darkMode');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (saved === 'true' || (saved === null && prefersDark)) {
        document.documentElement.classList.add('dark');
      }
      document.documentElement.classList.add('preload');
    })();
  </script>
  <style>
    .admin-section { padding: 60px 0; }
    .admin-card {
      background: #fff;
      border: 1px solid #e8e8e2;
      border-radius: 16px;
      padding: 36px;
      box-shadow: 0 2px 12px rgba(27,54,93,0.07);
      margin-bottom: 28px;
    }
    .admin-card h3 {
      font-size: 1rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #1B365D;
      margin-bottom: 24px;
    }
    .admin-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 40px;
    }
    .admin-top h2 { color: #1B365D; margin: 0; }
    .admin-form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    .admin-form-actions {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-top: 4px;
    }
    .btn-secondary {
      padding: 12px 24px;
      background: none;
      border: 1.5px solid #ccc;
      border-radius: 50px;
      font-family: 'Outfit', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      color: #666;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-secondary:hover { border-color: #999; color: #333; }
    .project-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 0;
      border-bottom: 1px solid #e8e8e2;
      gap: 16px;
    }
    .project-item:last-child { border-bottom: none; }
    .project-item-info { flex: 1; min-width: 0; }
    .project-item-info strong {
      display: block;
      color: #1B365D;
      font-size: 1rem;
      margin-bottom: 4px;
    }
    .project-item-tags { font-size: 0.8rem; color: #999; }
    .project-item-btns { display: flex; gap: 8px; flex-shrink: 0; }
    .btn-edit, .btn-delete {
      padding: 6px 16px;
      border-radius: 50px;
      font-family: 'Outfit', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      border: 1.5px solid;
      transition: background-color 0.2s, color 0.2s;
    }
    .btn-edit { color: #1B365D; border-color: #1B365D; background: none; }
    .btn-edit:hover { background: #1B365D; color: #F5F5F0; }
    .btn-delete { color: #c0392b; border-color: #c0392b; background: none; }
    .btn-delete:hover { background: #c0392b; color: #fff; }
    .status-msg { font-size: 0.9rem; font-weight: 500; min-height: 1.2em; }
    .status-success { color: #27ae60; }
    .status-error { color: #c0392b; }
    .status-neutral { color: #999; }
    .empty-state { color: #999; font-style: italic; padding: 16px 0; }
    /* Image field */
    .image-browse-row { display: flex; gap: 10px; align-items: center; }
    .image-preview-wrap { display: none; margin-top: 10px; align-items: center; gap: 12px; }
    .image-preview-wrap img { max-height: 80px; max-width: 160px; border-radius: 8px; border: 1px solid #e8e8e2; object-fit: cover; }
    .image-preview-actions { display: flex; flex-direction: column; gap: 6px; }
    .btn-sm { padding: 6px 14px !important; font-size: 0.8rem !important; }
    /* Crop modal */
    #crop-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 9999;
      align-items: center;
      justify-content: center;
    }
    #crop-inner {
      background: #1a1a2e;
      border-radius: 16px;
      padding: 24px;
      max-width: 90vw;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
      gap: 16px;
      overflow: auto;
    }
    #crop-header { display: flex; justify-content: space-between; align-items: center; }
    #crop-header .crop-title { color: #e6edf3; font-weight: 600; font-size: 1rem; font-family: 'Outfit', sans-serif; }
    #crop-header .crop-hint  { color: #8b949e; font-size: 0.85rem; font-family: 'Outfit', sans-serif; }
    #crop-stage {
      position: relative;
      cursor: crosshair;
      user-select: none;
      -webkit-user-select: none;
      line-height: 0;
      border-radius: 6px;
      overflow: hidden;
    }
    #crop-sel {
      display: none;
      position: absolute;
      border: 2px solid #fff;
      box-shadow: 0 0 0 9999px rgba(0,0,0,0.55);
      pointer-events: none;
      box-sizing: border-box;
    }
    .crop-handle {
      display: none;
      position: absolute;
      width: 10px;
      height: 10px;
      background: #fff;
      border: 1.5px solid rgba(0,0,0,0.4);
      border-radius: 2px;
      z-index: 10;
      box-sizing: border-box;
    }
    #crop-footer { display: flex; gap: 12px; }
    /* Dark mode */
    html.dark .admin-card { background: #0d1b2a; border-color: #21262d; }
    html.dark .admin-card h3 { color: #7aa2f7; }
    html.dark .admin-top h2 { color: #e6edf3; }
    html.dark .project-item { border-bottom-color: #21262d; }
    html.dark .project-item-info strong { color: #7aa2f7; }
    html.dark .project-item-tags { color: #8b949e; }
    html.dark .btn-secondary { border-color: #4a5568; color: #8b949e; }
    html.dark .btn-secondary:hover { border-color: #8b949e; color: #c9d1d9; }
    html.dark .btn-edit { color: #7aa2f7; border-color: #7aa2f7; }
    html.dark .btn-edit:hover { background: #7aa2f7; color: #010921; }
    html.dark .image-preview-wrap img { border-color: #21262d; }
    .admin-desc {
      margin-bottom: 20px;
      color: #555;
      line-height: 1.6;
    }
    .admin-label-hint {
      font-weight: 400;
      text-transform: none;
      letter-spacing: 0;
      color: #aaa;
    }
    html.dark .admin-desc { color: #8b949e; }
    html.dark .admin-label-hint { color: #6b7280; }
    @media (max-width: 600px) {
      .admin-form-row { grid-template-columns: 1fr; }
      .admin-top { flex-direction: column; align-items: flex-start; gap: 12px; }
      .project-item { flex-direction: column; align-items: flex-start; }
      .project-item-btns { align-self: flex-end; }
    }
  </style>
</head>

<body>
  <header class="onscroll">
    <div class="container">
      <h1><a href="index.html" style="text-decoration:none;color:inherit;">gabrielwynne.com</a></h1>
      <button class="dark-toggle" aria-label="Toggle dark mode">
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      </button>
    </div>
  </header>

  <main>
    <div class="container">
      <div class="admin-section">

        <!-- Token setup -->
        <div id="setup-section">
          <div class="admin-top">
            <h2>Admin</h2>
          </div>
          <div class="admin-card">
            <h3>Connect GitHub</h3>
            <p class="admin-desc">Enter a GitHub Personal Access Token with <strong>repo</strong> write access. It's stored only in your browser.</p>
            <div class="form-group" style="max-width:480px;">
              <label for="token-input">Personal Access Token</label>
              <input type="password" id="token-input" placeholder="ghp_...">
            </div>
            <div style="display:flex;align-items:center;gap:16px;margin-top:8px;">
              <button id="connect-btn" class="form-submit">Connect</button>
              <span id="connect-error" class="status-msg status-error" style="display:none;"></span>
            </div>
          </div>
        </div>

        <!-- Admin panel -->
        <div id="admin-panel" style="display:none;">
          <div class="admin-top">
            <h2>Portfolio Projects</h2>
            <button id="disconnect-btn" class="btn-secondary">Disconnect</button>
          </div>

          <!-- Add / Edit form -->
          <div class="admin-card">
            <h3 id="form-heading">Add Project</h3>
            <form id="project-form">
              <div class="form-group">
                <label for="proj-title">Title</label>
                <input type="text" id="proj-title" required placeholder="Project name">
              </div>
              <div class="form-group">
                <label for="proj-desc">Description</label>
                <textarea id="proj-desc" required placeholder="What does it do?" rows="3"></textarea>
              </div>
              <div class="form-group">
                <label for="proj-tags">Tags <span class="admin-label-hint">(comma-separated)</span></label>
                <input type="text" id="proj-tags" placeholder="Java, Python, React">
              </div>
              <div class="form-group">
                <label>Image <span class="admin-label-hint">(optional)</span></label>
                <div class="image-browse-row">
                  <button type="button" id="browse-btn" class="btn-secondary" style="white-space:nowrap;">Browse & Crop</button>
                  <input type="url" id="proj-image" placeholder="Or paste a URL" style="flex:1;">
                </div>
                <div id="image-preview-wrap" class="image-preview-wrap">
                  <img id="image-preview" alt="Preview">
                  <div class="image-preview-actions">
                    <button type="button" id="recrop-btn" class="btn-secondary btn-sm">Re-crop</button>
                    <button type="button" id="clear-image-btn" class="btn-secondary btn-sm">Clear</button>
                  </div>
                </div>
              </div>
              <input type="file" id="image-file-input" accept="image/*" style="display:none;">
              <div class="admin-form-row">
                <div class="form-group">
                  <label for="proj-github">GitHub URL</label>
                  <input type="url" id="proj-github" placeholder="https://github.com/...">
                </div>
                <div class="form-group">
                  <label for="proj-demo">Demo URL</label>
                  <input type="url" id="proj-demo" placeholder="https://...">
                </div>
              </div>
              <div class="admin-form-actions">
                <button type="submit" class="form-submit" id="submit-btn">Add Project</button>
                <button type="button" id="cancel-btn" class="btn-secondary" style="display:none;">Cancel</button>
                <span id="save-status" class="status-msg"></span>
              </div>
            </form>
          </div>

          <!-- Project list -->
          <div class="admin-card">
            <h3>Current Projects</h3>
            <div id="project-list"><p class="empty-state">Loading...</p></div>
          </div>
        </div>

      </div>
    </div>
  </main>

  <!-- Crop modal -->
  <div id="crop-modal">
    <div id="crop-inner">
      <div id="crop-header">
        <span class="crop-title">Crop Image</span>
        <span class="crop-hint">Drag to select an area</span>
      </div>
      <div id="crop-stage">
        <canvas id="crop-canvas"></canvas>
        <div id="crop-sel"></div>
      </div>
      <div id="crop-footer">
        <button type="button" id="crop-confirm-btn" class="form-submit">Crop & Use</button>
        <button type="button" id="crop-cancel-btn" class="btn-secondary">Cancel</button>
      </div>
    </div>
  </div>

  <script src="js/main.js"></script>
  <script>
    const OWNER  = 'gabrielawynne';
    const REPO   = 'personal';
    const FILE   = 'js/projects.json';
    const BRANCH = 'master';
    const API    = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE}`;

    let token    = localStorage.getItem('gh_admin_token') || '';
    let projects = [];
    let fileSha  = '';
    let editIdx  = null;

    // Crop / image state
    let cropFile     = null;
    let cropImg      = null;
    let cropResult   = null;
    let cropPrevUrl  = null;
    let cropScale    = 1;
    let cropSel      = { x: 0, y: 0, w: 0, h: 0 };
    let cropDragging  = false;
    let cropDragStart = { x: 0, y: 0 };
    let cropResizing      = null;
    let cropResizeStart   = null;

    // Existing DOM refs
    const setupSection  = document.getElementById('setup-section');
    const adminPanel    = document.getElementById('admin-panel');
    const tokenInput    = document.getElementById('token-input');
    const connectBtn    = document.getElementById('connect-btn');
    const connectError  = document.getElementById('connect-error');
    const disconnectBtn = document.getElementById('disconnect-btn');
    const projectForm   = document.getElementById('project-form');
    const projectList   = document.getElementById('project-list');
    const formHeading   = document.getElementById('form-heading');
    const submitBtn     = document.getElementById('submit-btn');
    const cancelBtn     = document.getElementById('cancel-btn');
    const saveStatus    = document.getElementById('save-status');

    // Image / crop DOM refs
    const fileInput        = document.getElementById('image-file-input');
    const browseBtn        = document.getElementById('browse-btn');
    const recropBtn        = document.getElementById('recrop-btn');
    const clearImageBtn    = document.getElementById('clear-image-btn');
    const imagePreviewWrap = document.getElementById('image-preview-wrap');
    const imagePreview     = document.getElementById('image-preview');
    const projImageUrl     = document.getElementById('proj-image');
    const cropModal        = document.getElementById('crop-modal');
    const cropStage        = document.getElementById('crop-stage');
    const cropCanvas       = document.getElementById('crop-canvas');
    const cropSelDiv       = document.getElementById('crop-sel');
    const cropConfirmBtn   = document.getElementById('crop-confirm-btn');
    const cropCancelBtn    = document.getElementById('crop-cancel-btn');

    const HANDLE_NAMES   = ['nw','n','ne','e','se','s','sw','w'];
    const HANDLE_CURSORS = { nw:'nw-resize', n:'n-resize', ne:'ne-resize', e:'e-resize', se:'se-resize', s:'s-resize', sw:'sw-resize', w:'w-resize' };
    const handleEls = {};
    HANDLE_NAMES.forEach(h => {
      const el = document.createElement('div');
      el.className    = 'crop-handle';
      el.style.cursor = HANDLE_CURSORS[h];
      el.dataset.handle = h;
      cropStage.appendChild(el);
      handleEls[h] = el;
    });

    // ── GitHub helpers ──────────────────────────────────────────────────────
    async function apiFetch(method, body) {
      const opts = {
        method,
        headers: {
          'Authorization': `Bearer ${token}`,
          'Accept': 'application/vnd.github.v3+json',
          'Content-Type': 'application/json'
        }
      };
      if (body) opts.body = JSON.stringify(body);
      const res = await fetch(API, opts);
      if (!res.ok) throw new Error(`GitHub API ${res.status}`);
      return res.json();
    }

    async function loadProjects() {
      const data = await apiFetch('GET');
      fileSha  = data.sha;
      projects = JSON.parse(atob(data.content.replace(/\n/g, '')));
    }

    async function commitProjects(message) {
      const content = btoa(unescape(encodeURIComponent(JSON.stringify(projects, null, 2))));
      const data = await apiFetch('PUT', { message, content, sha: fileSha, branch: BRANCH });
      fileSha = data.content.sha;
    }

    async function uploadImageToGitHub(blob, filename) {
      const base64 = await new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload  = () => resolve(reader.result.split(',')[1]);
        reader.onerror = reject;
        reader.readAsDataURL(blob);
      });
      const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/img/${filename}`, {
        method: 'PUT',
        headers: {
          'Authorization': `Bearer ${token}`,
          'Accept': 'application/vnd.github.v3+json',
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ message: `Upload image: ${filename}`, content: base64, branch: BRANCH })
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.message || `Image upload failed: ${res.status}`);
      }
      return `img/${filename}`;
    }

    // ── UI helpers ──────────────────────────────────────────────────────────
    function renderList() {
      if (!projects.length) {
        projectList.innerHTML = '<p class="empty-state">No projects yet. Add one above.</p>';
        return;
      }
      projectList.innerHTML = projects.map((p, i) => `
        <div class="project-item">
          <div class="project-item-info">
            <strong>${p.title}</strong>
            <span class="project-item-tags">${p.tags.join(' · ') || 'No tags'}</span>
          </div>
          <div class="project-item-btns">
            <button class="btn-edit" onclick="startEdit(${i})">Edit</button>
            <button class="btn-delete" onclick="deleteProject(${i})">Delete</button>
          </div>
        </div>
      `).join('');
    }

    function setStatus(msg, type) {
      saveStatus.textContent = msg;
      saveStatus.className   = `status-msg status-${type}`;
      if (type !== 'neutral') setTimeout(() => { saveStatus.textContent = ''; }, 4000);
    }

    function showPreview(src) {
      imagePreview.src = src;
      imagePreviewWrap.style.display = 'flex';
    }

    function clearImageState() {
      cropResult = null;
      cropFile   = null;
      if (cropPrevUrl) { URL.revokeObjectURL(cropPrevUrl); cropPrevUrl = null; }
      imagePreview.src = '';
      imagePreviewWrap.style.display = 'none';
      projImageUrl.value = '';
      fileInput.value    = '';
    }

    function resetForm() {
      projectForm.reset();
      editIdx                 = null;
      formHeading.textContent = 'Add Project';
      submitBtn.textContent   = 'Add Project';
      cancelBtn.style.display = 'none';
      clearImageState();
    }

    // ── Crop modal ──────────────────────────────────────────────────────────
    function renderCropSel() {
      if (cropSel.w < 2 || cropSel.h < 2) {
        cropSelDiv.style.display = 'none';
        HANDLE_NAMES.forEach(h => { handleEls[h].style.display = 'none'; });
        return;
      }
      cropSelDiv.style.display = 'block';
      cropSelDiv.style.left    = cropSel.x + 'px';
      cropSelDiv.style.top     = cropSel.y + 'px';
      cropSelDiv.style.width   = cropSel.w + 'px';
      cropSelDiv.style.height  = cropSel.h + 'px';
      const { x, y, w, h } = cropSel;
      const hpos = {
        nw:{x,y},          n:{x:x+w/2,y},     ne:{x:x+w,y},
        e: {x:x+w,y:y+h/2},                   se:{x:x+w,y:y+h},
        s: {x:x+w/2,y:y+h},                   sw:{x,y:y+h},
        w: {x,y:y+h/2}
      };
      HANDLE_NAMES.forEach(name => {
        const el = handleEls[name];
        const p  = hpos[name];
        el.style.display = 'block';
        el.style.left    = (p.x - 5) + 'px';
        el.style.top     = (p.y - 5) + 'px';
      });
    }

    function getCropPos(e) {
      const rect = cropStage.getBoundingClientRect();
      const src  = e.touches ? e.touches[0] : e;
      return {
        x: Math.max(0, Math.min(src.clientX - rect.left, cropCanvas.width)),
        y: Math.max(0, Math.min(src.clientY - rect.top,  cropCanvas.height))
      };
    }

    function openCropModal(file) {
      cropFile = file;
      const url = URL.createObjectURL(file);
      const img = new Image();
      img.onload = () => {
        cropImg = img;
        const maxW = Math.min(window.innerWidth  - 80, 800);
        const maxH = Math.min(window.innerHeight - 200, 550);
        cropScale = Math.min(1, maxW / img.naturalWidth, maxH / img.naturalHeight);
        const dw = Math.round(img.naturalWidth  * cropScale);
        const dh = Math.round(img.naturalHeight * cropScale);
        cropCanvas.width  = dw;
        cropCanvas.height = dh;
        cropCanvas.style.width  = dw + 'px';
        cropCanvas.style.height = dh + 'px';
        cropCanvas.getContext('2d').drawImage(img, 0, 0, dw, dh);
        cropSel = { x: 0, y: 0, w: dw, h: dh };
        renderCropSel();
        cropModal.style.display = 'flex';
        URL.revokeObjectURL(url);
      };
      img.src = url;
    }

    cropStage.addEventListener('mousedown', e => {
      if (e.target.dataset && e.target.dataset.handle) {
        cropResizing    = e.target.dataset.handle;
        cropResizeStart = { p: getCropPos(e), sel: { ...cropSel } };
        return;
      }
      cropDragStart = getCropPos(e);
      cropSel = { x: cropDragStart.x, y: cropDragStart.y, w: 0, h: 0 };
      cropDragging = true;
    });
    document.addEventListener('mouseup', () => { cropDragging = false; cropResizing = null; });
    cropStage.addEventListener('mousemove', e => {
      if (cropResizing) {
        const p  = getCropPos(e);
        const s  = cropResizeStart;
        let { x, y, w, h } = s.sel;
        const dx = p.x - s.p.x;
        const dy = p.y - s.p.y;
        if (cropResizing.includes('e')) w = Math.max(4, s.sel.w + dx);
        if (cropResizing.includes('s')) h = Math.max(4, s.sel.h + dy);
        if (cropResizing.includes('w')) {
          let newX = Math.max(0, Math.min(s.sel.x + dx, s.sel.x + s.sel.w - 4));
          w = s.sel.w + (s.sel.x - newX);
          x = newX;
        }
        if (cropResizing.includes('n')) {
          let newY = Math.max(0, Math.min(s.sel.y + dy, s.sel.y + s.sel.h - 4));
          h = s.sel.h + (s.sel.y - newY);
          y = newY;
        }
        x = Math.max(0, x);
        y = Math.max(0, y);
        w = Math.min(w, cropCanvas.width  - x);
        h = Math.min(h, cropCanvas.height - y);
        cropSel = { x, y, w, h };
        renderCropSel();
        return;
      }
      if (!cropDragging) return;
      const p = getCropPos(e);
      cropSel = {
        x: Math.min(p.x, cropDragStart.x),
        y: Math.min(p.y, cropDragStart.y),
        w: Math.abs(p.x - cropDragStart.x),
        h: Math.abs(p.y - cropDragStart.y)
      };
      renderCropSel();
    });
    cropStage.addEventListener('mouseleave', () => { cropDragging = false; });

    cropStage.addEventListener('touchstart', e => {
      e.preventDefault();
      cropDragStart = getCropPos(e);
      cropSel = { x: cropDragStart.x, y: cropDragStart.y, w: 0, h: 0 };
      cropDragging = true;
    }, { passive: false });
    cropStage.addEventListener('touchmove', e => {
      e.preventDefault();
      if (!cropDragging) return;
      const p = getCropPos(e);
      cropSel = {
        x: Math.min(p.x, cropDragStart.x),
        y: Math.min(p.y, cropDragStart.y),
        w: Math.abs(p.x - cropDragStart.x),
        h: Math.abs(p.y - cropDragStart.y)
      };
      renderCropSel();
    }, { passive: false });
    cropStage.addEventListener('touchend', () => { cropDragging = false; });

    cropConfirmBtn.addEventListener('click', () => {
      const hasSel = cropSel.w > 4 && cropSel.h > 4;
      const srcX   = hasSel ? Math.round(cropSel.x / cropScale) : 0;
      const srcY   = hasSel ? Math.round(cropSel.y / cropScale) : 0;
      const srcW   = hasSel ? Math.round(cropSel.w / cropScale) : cropImg.naturalWidth;
      const srcH   = hasSel ? Math.round(cropSel.h / cropScale) : cropImg.naturalHeight;
      const outW   = Math.min(srcW, 1200);
      const outH   = Math.round(srcH * (outW / srcW));
      const out    = document.createElement('canvas');
      out.width    = outW;
      out.height   = outH;
      out.getContext('2d').drawImage(cropImg, srcX, srcY, srcW, srcH, 0, 0, outW, outH);
      out.toBlob(blob => {
        cropResult = blob;
        if (cropPrevUrl) URL.revokeObjectURL(cropPrevUrl);
        cropPrevUrl = URL.createObjectURL(blob);
        showPreview(cropPrevUrl);
        projImageUrl.value = '';
        cropModal.style.display = 'none';
      }, 'image/jpeg', 0.92);
    });

    cropCancelBtn.addEventListener('click', () => { cropModal.style.display = 'none'; });

    browseBtn.addEventListener('click',     () => fileInput.click());
    recropBtn.addEventListener('click',     () => { if (cropFile) openCropModal(cropFile); });
    clearImageBtn.addEventListener('click', clearImageState);

    fileInput.addEventListener('change', () => {
      if (fileInput.files[0]) openCropModal(fileInput.files[0]);
    });

    projImageUrl.addEventListener('input', () => {
      const val = projImageUrl.value.trim();
      if (val) {
        cropResult = null;
        if (cropPrevUrl) { URL.revokeObjectURL(cropPrevUrl); cropPrevUrl = null; }
        showPreview(val);
      } else {
        imagePreview.src = '';
        imagePreviewWrap.style.display = 'none';
      }
    });

    // ── Project CRUD ────────────────────────────────────────────────────────
    window.startEdit = function(i) {
      const p = projects[i];
      editIdx = i;
      document.getElementById('proj-title').value  = p.title;
      document.getElementById('proj-desc').value   = p.description;
      document.getElementById('proj-tags').value   = p.tags.join(', ');
      projImageUrl.value = p.image || '';
      document.getElementById('proj-github').value = p.github || '';
      document.getElementById('proj-demo').value   = p.demo   || '';

      cropResult = null;
      cropFile   = null;
      if (cropPrevUrl) { URL.revokeObjectURL(cropPrevUrl); cropPrevUrl = null; }
      fileInput.value = '';

      if (p.image) showPreview(p.image);
      else { imagePreview.src = ''; imagePreviewWrap.style.display = 'none'; }

      formHeading.textContent    = 'Edit Project';
      submitBtn.textContent      = 'Save Changes';
      cancelBtn.style.display    = 'inline-block';
      projectForm.scrollIntoView({ behavior: 'smooth', block: 'start' });
    };

    window.deleteProject = async function(i) {
      if (!confirm(`Delete "${projects[i].title}"?`)) return;
      const title = projects[i].title;
      projects.splice(i, 1);
      try {
        setStatus('Saving…', 'neutral');
        await commitProjects(`Remove "${title}"`);
        renderList();
        setStatus('Deleted.', 'success');
      } catch (e) {
        setStatus(e.message, 'error');
      }
    };

    projectForm.addEventListener('submit', async e => {
      e.preventDefault();
      submitBtn.disabled = true;

      let imageValue = projImageUrl.value.trim() || null;

      if (cropResult) {
        setStatus('Uploading image…', 'neutral');
        try {
          const ext  = cropResult.type === 'image/png' ? 'png' : 'jpg';
          const slug = document.getElementById('proj-title').value.trim()
            .toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '') || 'project';
          imageValue = await uploadImageToGitHub(cropResult, `${Date.now()}-${slug}.${ext}`);
        } catch (err) {
          setStatus(`Image upload failed: ${err.message}`, 'error');
          submitBtn.disabled = false;
          return;
        }
      }

      const project = {
        id:          editIdx !== null ? projects[editIdx].id : Date.now(),
        title:       document.getElementById('proj-title').value.trim(),
        description: document.getElementById('proj-desc').value.trim(),
        tags:        document.getElementById('proj-tags').value.split(',').map(t => t.trim()).filter(Boolean),
        image:       imageValue,
        github:      document.getElementById('proj-github').value.trim() || null,
        demo:        document.getElementById('proj-demo').value.trim()   || null,
      };

      if (editIdx !== null) projects[editIdx] = project;
      else projects.push(project);

      setStatus('Saving…', 'neutral');
      try {
        await commitProjects(editIdx !== null ? `Update "${project.title}"` : `Add "${project.title}"`);
        resetForm();
        renderList();
        setStatus('Saved!', 'success');
      } catch (err) {
        setStatus(err.message, 'error');
      } finally {
        submitBtn.disabled = false;
      }
    });

    cancelBtn.addEventListener('click', resetForm);

    disconnectBtn.addEventListener('click', () => {
      localStorage.removeItem('gh_admin_token');
      token = '';
      adminPanel.style.display   = 'none';
      setupSection.style.display = 'block';
    });

    connectBtn.addEventListener('click', async () => {
      const t = tokenInput.value.trim();
      if (!t) return;
      token = t;
      connectBtn.textContent     = 'Connecting…';
      connectBtn.disabled        = true;
      connectError.style.display = 'none';
      try {
        await loadProjects();
        localStorage.setItem('gh_admin_token', token);
        setupSection.style.display = 'none';
        adminPanel.style.display   = 'block';
        renderList();
      } catch (e) {
        connectError.textContent   = `Could not connect: ${e.message}`;
        connectError.style.display = 'inline';
        token = '';
      } finally {
        connectBtn.textContent = 'Connect';
        connectBtn.disabled    = false;
      }
    });

    // Auto-connect if token already stored
    if (token) {
      loadProjects()
        .then(() => {
          setupSection.style.display = 'none';
          adminPanel.style.display   = 'block';
          renderList();
        })
        .catch(() => {
          localStorage.removeItem('gh_admin_token');
          token = '';
        });
    }
  </script>
</body>

</html>
